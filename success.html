<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Order Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --success: #10b981;
            --success-dark: #059669;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .success-container {
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .success-icon i {
            color: white;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .header p {
            opacity: 0.95;
            font-size: 1rem;
            font-weight: 500;
            max-width: 300px;
            margin: 0 auto;
        }

        /* Content */
        .content {
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .order-details {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 1.75rem;
            margin: 2rem 0 2.5rem 0;
            border: 1px solid var(--gray-100);
        }

        .order-details h3 {
            color: var(--gray-900);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            border-bottom: none;
            margin-top: 0.75rem;
            font-weight: 700;
            color: var(--success);
            font-size: 1.125rem;
        }

        .detail-label {
            color: var(--gray-600);
        }

        .detail-value {
            font-weight: 500;
            color: var(--gray-900);
        }

        /* Buttons - FIXED VISIBILITY */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 160px;
            padding: 1.125rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
            flex: 1;
            max-width: 220px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 2px solid var(--gray-200);
            flex: 1;
            max-width: 180px;
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .button-group {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .btn {
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }
            
            .content {
                padding: 2rem 1.5rem;
            }
            
            .header {
                padding: 2.5rem 1.5rem 2rem;
            }
            
            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <!-- Header -->
        <div class="header">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Payment Successful!</h1>
            <p>Thank you for your purchase. Your order has been confirmed.</p>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="order-details">
                <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                <div class="detail-row">
                    <span class="detail-label">Order ID</span>
                    <span class="detail-value">#ORD-2024-00123</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment Method</span>
                    <span class="detail-value">Visa ****4242</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Items</span>
                    <span class="detail-value">1 × Funky Sherpa Bag</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Amount</span>
                    <span class="detail-value">Rs 3,000</span>
                </div>
            </div>

            <div class="button-group">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-shopping-bag"></i>
                    Continue Shopping
                </a>
                <a href="cart.html" class="btn btn-secondary" onclick="viewOrder()">
                    <i class="fas fa-eye"></i>
                    View Order Details
                </a>
            </div>
        </div>
    </div>

    <script>
      
        // Auto-scroll to buttons on load
        window.addEventListener('load', function() {
            const buttons = document.querySelector('.button-group');
            buttons.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    </script>
</body>
</html>
