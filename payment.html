<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Payment Method</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #059669;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray-50);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .header-icon {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* Back Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Content */
        .content {
            padding: 2.5rem;
        }

        /* Payment Options */
        .payment-options {
            margin-bottom: 2rem;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 1.25rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1rem;
        }

        .payment-option:hover {
            border-color: var(--primary);
            background: var(--gray-50);
        }

        .payment-option.selected {
            border-color: var(--primary);
            background: var(--gray-50);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .payment-input {
            display: none;
        }

        .payment-preview {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .payment-logo {
            width: 48px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--gray-100);
            padding: 0.25rem;
        }

        .payment-details h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .payment-details p {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .radio-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray-300);
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .radio-custom::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.2s ease;
        }

        .payment-input:checked + .payment-preview + .radio-custom::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .payment-input:checked + .payment-preview + .radio-custom {
            border-color: var(--primary);
        }

        /* Error */
        .error-message {
            display: none;
            background: #fef2f2;
            color: #dc2626;
            padding: 1rem;
            border: 1px solid #fecaca;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Button */
        .btn-proceed {
            width: 100%;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-proceed:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-proceed:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-proceed .loading {
            display: none;
        }

        .btn-proceed.loading .text {
            display: none;
        }

        .btn-proceed.loading .loading {
            display: inline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }
            
            .content {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-credit-card"></i>
            </div>
            <h1>Select Payment Method</h1>
            <p>Choose your preferred payment option</p>
        </div>

        <div class="content">
            <a href="index.html" class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back
            </a>

            <div class="payment-options">
                <label class="payment-option">
                    <input type="radio" id="visa" name="payment" value="visa" class="payment-input">
                    <div class="payment-preview">
                        <img src="images/visa1.png" alt="Visa" class="payment-logo">
                        <div class="payment-details">
                            <h3>Visa</h3>
                            <p>•••• •••• •••• 4242</p>
                        </div>
                    </div>
                    <div class="radio-custom"></div>
                </label>

                <label class="payment-option">
                    <input type="radio" id="mastercard" name="payment" value="mastercard" class="payment-input">
                    <div class="payment-preview">
                        <img src="images/mastercard.jpg" alt="Mastercard" class="payment-logo">
                        <div class="payment-details">
                            <h3>Mastercard</h3>
                            <p>•••• •••• •••• 5424</p>
                        </div>
                    </div>
                    <div class="radio-custom"></div>
                </label>

                <label class="payment-option">
                    <input type="radio" id="paypal" name="payment" value="paypal" class="payment-input">
                    <div class="payment-preview">
                        <img src="images/paypal.webp" alt="PayPal" class="payment-logo">
                        <div class="payment-details">
                            <h3>PayPal</h3>
                            <p>your.email@example.com</p>
                        </div>
                    </div>
                    <div class="radio-custom"></div>
                </label>

                <label class="payment-option">
                    <input type="radio" id="esewa" name="payment" value="esewa" class="payment-input">
                    <div class="payment-preview">
                        <img src="images/eswa1.avif" alt="ESewa" class="payment-logo">
                        <div class="payment-details">
                            <h3>ESewa Wallet</h3>
                            <p>Balance: Rs 5,000</p>
                        </div>
                    </div>
                    <div class="radio-custom"></div>
                </label>
            </div>

            <div class="error-message" id="errorMsg">
                Please select a payment method
            </div>

            <button class="btn-proceed" id="proceedBtn">
                <span class="text">
                    <i class="fas fa-lock"></i>
                    Proceed to Pay
                </span>
                <span class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    Processing...
                </span>
            </button>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }

        const proceedBtn = document.getElementById('proceedBtn');
        const errorMsg = document.getElementById('errorMsg');
        let selectedOption = null;

        // Handle payment option selection
        document.querySelectorAll('.payment-option').forEach(option => {
            option.addEventListener('click', function() {
                const input = this.querySelector('.payment-input');
                input.checked = true;
                
                // Update visual states
                document.querySelectorAll('.payment-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
                
                errorMsg.classList.remove('show');
                selectedOption = input.value;
            });
        });

        // Handle proceed button
        proceedBtn.addEventListener('click', function() {
            if (!selectedOption) {
                errorMsg.classList.add('show');
                return;
            }

            // Show loading state
            proceedBtn.disabled = true;
            proceedBtn.classList.add('loading');

            // Redirect after delay
            setTimeout(() => {
                window.location.href = 'success.html';
            }, 1200);
        });
    </script>
</body>
</html>
