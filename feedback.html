<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimberArt Nepal - Customer Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #1e3a8a;
      --primary-dark: #1e40af;
      --secondary-color: #10b981;
      --accent-color: #f59e0b;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }
 /* Logo Section */
    .logo-section {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0.75rem;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .logo-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .logo-section:hover::before {
      left: 100%;
    }

    .logo-section:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(30, 58, 138, 0.3);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    /* Logo Image */
    .logo {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .logo-section:hover .logo {
      transform: scale(1.1) rotate(5deg);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 12px 35px rgba(245, 158, 11, 0.4);
    }

    /* Brand Name */
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
      line-height: 1.2;
      position: relative;
    }

    .brand::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 30px;
      height: 2px;
      background: var(--accent-color);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    .logo-section:hover .brand::after {
      width: 60px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .header-container {
        margin: 1rem;
        padding: 1.25rem 1.5rem;
      }
      
      .logo {
        width: 50px;
        height: 50px;
      }
      
      .brand {
        font-size: 1.3rem;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      color: var(--text-primary);
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .logo i {
      font-size: 2rem;
      color: var(--accent-color);
    }

    /* Back Button */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    /* Main Container */
    .main-container {
      max-width: 800px;
      margin: 4rem auto;
      padding: 0 2rem;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 4rem;
      padding: 3rem 2rem;
      background: var(--bg-primary);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
    }

    .hero-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--secondary-color), #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 20px 25px -5px rgb(16 185 129 / 0.3);
    }

    .hero-icon i {
      font-size: 2.5rem;
      color: white;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* Feedback Form */
    .feedback-card {
      background: var(--bg-primary);
      padding: 3rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }

    .feedback-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }

    .form-group {
      margin-bottom: 2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.75rem;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
      letter-spacing: -0.025em;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 2px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
      background: #fafbfc;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      background: white;
      box-shadow: 0 0 0 3px rgb(30 58 138 / 0.1);
      transform: translateY(-2px);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 1.25rem;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -5px rgb(30 58 138 / 0.4);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    /* Success Message */
    .success-message {
      display: none;
      background: linear-gradient(135deg, var(--secondary-color), #059669);
      color: white;
      padding: 2rem;
      border-radius: var(--radius);
      text-align: center;
      margin-top: 2rem;
      animation: slideUp 0.5s ease-out;
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .feedback-card {
      animation: fadeInUp 0.8s ease-out;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .header-container,
      .main-container {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .hero p {
        font-size: 1.1rem;
      }

      .feedback-card {
        padding: 2rem 1.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .logo {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .main-container {
        margin: 2rem auto;
      }

      .hero {
        padding: 2rem 1rem;
        margin-bottom: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo-section">
            <img src="images/logo.png" alt="TimberArt Nepal" class="logo">
            <span class="brand">TimberArt Nepal</span>
        </a>
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Back to Home
      </a>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-icon">
        <i class="fas fa-comment-dots"></i>
      </div>
      <h1>Share Your Feedback</h1>
      <p>
        Your opinion matters to us. Help us improve our services by sharing your valuable thoughts and suggestions.
      </p>
    </section>

    <!-- Feedback Form -->
    <div class="feedback-card">
      <form id="feedbackForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="name">
              <i class="fas fa-user"></i> Full Name
            </label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              class="form-input" 
              placeholder="Enter your full name"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="email">
              <i class="fas fa-envelope"></i> Email Address
            </label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="your.email@example.com"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="feedback">
            <i class="fas fa-edit"></i> Your Feedback
          </label>
          <textarea 
            id="feedback" 
            name="feedback" 
            class="form-textarea" 
            placeholder="Please share your experience, suggestions, or any concerns..."
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-paper-plane"></i>
          Submit Feedback
        </button>
      </form>

      <div id="successMessage" class="success-message">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h3>Thank You!</h3>
        <p>Your feedback has been submitted successfully. We truly appreciate your time and input.</p>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    const feedbackForm = document.getElementById('feedbackForm');
    const successMessage = document.getElementById('successMessage');

    feedbackForm.addEventListener('submit', function (e) {
      e.preventDefault();
      
      // Simulate form submission
      const submitBtn = feedbackForm.querySelector('.submit-btn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      submitBtn.disabled = true;

      setTimeout(() => {
        feedbackForm.style.display = 'none';
        successMessage.style.display = 'block';
      }, 1500);
    });

    // Smooth scrolling for anchor links (if needed)
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });
  </script>
</body>
</html>
