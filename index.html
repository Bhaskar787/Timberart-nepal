<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimberArt-Nepal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to bottom, #f8f9fa, #ffffff);
    color: #333;
}

/* Header */
.header {
    background: linear-gradient(90deg, #00264d, #004080);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: top 0.3s;
}

.header .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 15px;
}

.header-left h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 1px;
}

.header-left .logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
    background-color: white;
}

/* Nav Links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

.nav-links a:hover { color: #ffd700; }

/* Hamburger Menu */
.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
}

.hamburger div {
    width: 25px;
    height: 3px;
    background-color: white;
    transition: all 0.3s;
}

/* Auth Buttons */
.auth-buttons {
    display: flex;
    gap: 15px;
}

.auth-buttons a {
    background-color: white;
    color: #004080;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 5px;
    font-weight: bold;
    transition: background-color 0.3s, color 0.3s;
}

.auth-buttons a:hover { background-color: #004080; color: white; }



/* Products Section */
.products-section {
    max-width: 1200px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
}

.products-title {
    font-size: 28px;
    font-weight: bold;
    color: #004080;
    margin-bottom: 30px;
    text-transform: uppercase;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    padding: 0 20px;
}

.product-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    padding: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.product-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
    transition: transform 0.3s;
}

.product-card:hover img { transform: scale(1.1); }

.product-card h3 {
    font-size: 20px;
    margin: 10px 0;
    color: #333;
}

/* Footer */
.footer {
    background: #00264d;
    color: white;
    text-align: center;
    padding: 20px 10px;
    margin-top: 40px;
    font-size: 16px;
}

.footer p { margin: 0; }
.footer a {
    color: #ffd700;
    text-decoration: none;
    margin: 0 5px;
}
.footer a:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 768px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .header-left h1 { font-size: 22px; }
    .header-left .logo { width: 60px; height: 60px; }
    .products-title { font-size: 24px; }
    .product-card h3 { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header" id="header">
    <div class="container">
        <div class="header-left">
            <h1>TimberArt-Nepal</h1>
            <img src="images/logo.png" alt="Logo" class="logo">
        </div>

        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="aboutus.html">About Us</a>
            <a href="contactus.html">Contact Us</a>
            <a href="cart.html">My Cart</a>
        </nav>

        <div class="auth-buttons">
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
        </div>

        <div class="hamburger" id="hamburger">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
</div>



<!-- Products Section -->
<div class="products-section" id="products">
    <h2 class="products-title">Our Products</h2>
    <div class="products-grid">
        <div class="product-card">
            <a href="wood.html"><img src="images/sovinier.png" alt="Unique Wood Carvings"></a>
            <h3>Unique Wood Carvings</h3>
        </div>
        <div class="product-card">
            <a href="metal_statues.html"><img src="images/metal_statues.png" alt="Metal Statues"></a>
            <h3>Metal Statues</h3>
        </div>
        <div class="product-card">
            <a href="Thangaka.html"><img src="images/thang.png" alt="Thangka"></a>
            <h3>Thangka</h3>
        </div>
        <div class="product-card">
            <a href="TT.html"><img src="images/trouser.png" alt="Trousers & T-Shirts"></a>
            <h3>Trousers & T-Shirts</h3>
        </div>
        <div class="product-card">
            <a href="funkybags.html"><img src="images/funky_bags.png" alt="Funky Bags"></a>
            <h3>Funky Bags</h3>
        </div>
        <div class="product-card">
            <a href="scarves.html"><img src="images/scarves.png" alt="Scarves"></a>
            <h3>Scarves</h3>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>&copy; 2024 TimberArt-Nepal. All rights reserved. | <a href="privacy.html">Privacy Policy</a></p>
</div>

<script>
const header = document.getElementById('header');
const mobileButton = document.getElementById('mobileButton');

const hamburger = document.getElementById('hamburger');
const navLinks = document.querySelector('.nav-links');
let lastScrollTop = 0;

// Scroll behavior
window.addEventListener('scroll', () => {
    const st = window.pageYOffset || document.documentElement.scrollTop;
    if (st > lastScrollTop && st > 100) {
        header.style.top = '-100px';
        mobileButton.style.display = 'flex';
    } else {
        header.style.top = '0';
        mobileButton.style.display = 'none';
    }
    lastScrollTop = st <= 0 ? 0 : st;
});


// Hamburger toggle for small screens
hamburger.addEventListener('click', (e) => {
    e.stopPropagation();
    navLinks.style.display = (navLinks.style.display === 'flex') ? 'none' : 'flex';
    navLinks.style.flexDirection = 'column';
    navLinks.style.background = '#004080';
    navLinks.style.position = 'absolute';
    navLinks.style.top = '100%';
    navLinks.style.right = '20px';
    navLinks.style.padding = '10px';
    navLinks.style.borderRadius = '8px';
});

// Click outside to close both menus
document.addEventListener('click', (e) => {
    if (!mobileMenu.contains(e.target) && e.target !== mobileButton) mobileMenu.style.display = 'none';
    if (!navLinks.contains(e.target) && e.target !== hamburger && window.innerWidth <= 768) navLinks.style.display = 'none';
});
</script>

</body>
</html>
