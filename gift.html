<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimberArt Nepal - Send a Gift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b4513;
            --primary-dark: #6b3a0f;
            --accent-gold: #d4af37;
            --success: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.15);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, #e5e7eb 100%);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            z-index: -1;
        }

        .main-container {
            max-width: 650px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2.5rem;
            align-items: start;
        }

        /* Back Button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            background: var(--white);
            color: var(--gray-700);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: absolute;
            left: 2rem;
            top: 2rem;
            z-index: 10;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            color: var(--primary);
        }

        /* Gift Preview */
        .gift-preview {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .preview-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .preview-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .gift-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .gift-image::before {
            content: '🎁';
            font-size: 4rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .preview-details {
            text-align: center;
        }

        .preview-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .preview-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .total-section {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .total-label {
            color: var(--gray-600);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .total-amount {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* Form */
        .gift-form {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow);
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        .form-subtitle {
            color: var(--gray-600);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gray-900);
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
            transform: translateY(-1px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Message Section */
        .message-group {
            grid-column: 1 / -1;
        }

        .message-input {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        /* Payment Options */
        .payment-group {
            background: var(--gray-50);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .payment-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 1rem;
        }

        .payment-options {
            display: flex;
            gap: 1rem;
        }

        .payment-option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .payment-option:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .payment-option.selected {
            border-color: var(--primary);
            background: var(--gray-50);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.15);
        }

        .payment-icon {
            font-size: 1.25rem;
            color: var(--primary);
        }

        .payment-input {
            display: none;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                margin: 1rem auto;
            }
            
            .gift-preview {
                order: -1;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .gift-form, .gift-preview {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="main-container">
        <!-- Gift Preview (Right Sidebar) -->
        <div class="gift-preview">
            <div class="preview-header">
                <h2 class="preview-title">Gift Preview</h2>
            </div>
            <div class="gift-image"></div>
            <div class="preview-details">
                <div class="preview-name" id="previewName">Funky Sherpa Bag</div>
                <div class="preview-price">Rs 3,000</div>
            </div>
            <div class="total-section">
                <div class="total-label">Total Amount</div>
                <div class="total-amount" id="totalAmount">Rs 3,000</div>
            </div>
        </div>

        <!-- Gift Form (Main Content) -->
        <div class="gift-form">
            <div class="form-header">
                <h1 class="form-title">Send a Beautiful Gift</h1>
                <p class="form-subtitle">Make someone smile with handcrafted TimberArt</p>
            </div>

            <form id="giftForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="recipientName">
                            <i class="fas fa-user"></i> Recipient's Name
                        </label>
                        <input type="text" id="recipientName" class="form-input" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="recipientEmail">
                            <i class="fas fa-envelope"></i> Recipient's Email
                        </label>
                        <input type="email" id="recipientEmail" class="form-input" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="senderName">
                            <i class="fas fa-gift"></i> Your Name (Sender)
                        </label>
                        <input type="text" id="senderName" class="form-input" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="senderEmail">
                            <i class="fas fa-user-tag"></i> Your Email
                        </label>
                        <input type="email" id="senderEmail" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group message-group">
                        <label class="form-label" for="giftMessage">
                            <i class="fas fa-edit"></i> Personal Message
                        </label>
                        <textarea id="giftMessage" class="form-input message-input" 
                            placeholder="Write a heartfelt message for your loved one... (Optional)"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="deliveryDate">
                            <i class="fas fa-calendar"></i> Delivery Date
                        </label>
                        <input type="date" id="deliveryDate" class="form-input" required>
                    </div>
                </div>

                <!-- Payment Section -->
                <div class="payment-group">
                    <div class="payment-title">
                        <i class="fas fa-credit-card"></i> Secure Payment
                    </div>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="credit" class="payment-input" required>
                            <i class="fas fa-credit-card payment-icon"></i>
                            <span>Credit/Debit Card</span>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="wallet" class="payment-input">
                            <i class="fas fa-wallet payment-icon"></i>
                            <span>Digital Wallet</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-gift"></i>
                    Send Gift Now
                </button>
            </form>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }

        // Live preview updates
        document.getElementById('recipientName').addEventListener('input', function(e) {
            document.getElementById('previewName').textContent = e.target.value || 'Funky Sherpa Bag';
        });

        // Form submission
        document.getElementById('giftForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const giftData = Object.fromEntries(formData);
            
            // Simulate API call
            const submitBtn = this.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending Gift...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                alert('🎉 Gift sent successfully!\n\nRecipient will receive a beautiful gift notification.');
                
            }, 2000);
        });

        // Set minimum delivery date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('deliveryDate').min = tomorrow.toISOString().split('T')[0];

        // Payment option selection
        document.querySelectorAll('.payment-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('.payment-input').checked = true;
            });
        });
    </script>
</body>
</html>
